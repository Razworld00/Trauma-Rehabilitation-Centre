<svg width="1400" height="360" viewBox="0 0 1400 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#003087" />
      <stop offset="55%" stop-color="#00A651" />
      <stop offset="100%" stop-color="#FFCC00" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.96" />
      <stop offset="100%" stop-color="#F4FAFF" stop-opacity="0.96" />
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#003087" flood-opacity="0.2" />
    </filter>
    <clipPath id="markClip">
      <circle cx="180" cy="180" r="117" />
    </clipPath>
  </defs>

  <rect x="6" y="6" width="1388" height="348" rx="34" fill="url(#bgGrad)" stroke="#D6E6FF" stroke-width="2" />

  <g filter="url(#softShadow)">
    <circle cx="180" cy="180" r="132" fill="url(#ringGrad)" />
    <circle cx="180" cy="180" r="120" fill="#FFFFFF" />
    <g clip-path="url(#markClip)">
      <image href="trc-logo-official-source.png" x="8" y="95" width="344" height="191" preserveAspectRatio="xMidYMid slice" />
    </g>
    <circle cx="180" cy="180" r="117" fill="none" stroke="#E5F0FF" stroke-width="2" />
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="350" y="126" fill="#003087" font-size="58" font-weight="800" letter-spacing="1.5">TRAUMA &amp;</text>
    <text x="350" y="186" fill="#00A651" font-size="58" font-weight="800" letter-spacing="1.5">REHABILITATION CENTRE</text>
    <text x="350" y="230" fill="#334155" font-size="24" font-weight="600">Empowering Lives Through Education, Social Healing, and Community Impact</text>

    <rect x="350" y="258" width="195" height="44" rx="22" fill="#003087" />
    <text x="381" y="286" fill="#FFFFFF" font-size="19" font-weight="700">NPO 257-320</text>

    <rect x="564" y="258" width="242" height="44" rx="22" fill="#00A651" />
    <text x="602" y="286" fill="#FFFFFF" font-size="19" font-weight="700">EST. APRIL 2024</text>

    <rect x="825" y="258" width="246" height="44" rx="22" fill="#FFCC00" />
    <text x="853" y="286" fill="#003087" font-size="19" font-weight="800">EAST LONDON, EC</text>
  </g>
</svg>
